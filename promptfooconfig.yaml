description: KittyBuilder intent-compiler regression scaffold
prompts:
  - "{{input}}"
providers:
  - "exec:venv/bin/python scripts/builder_intake.py --project . --text \"{{prompt}}\" --compile-brief"
tests:
  - vars:
      input: "clean up everything and make it better"
    assert:
      - type: contains
        value: "\"recommended_execution_mode\": \"human_question\""
  - vars:
      input: "continue unified command system through kittybuilder and verify it works"
    assert:
      - type: contains
        value: "\"recommended_execution_mode\": \"single_worker\""
  - vars:
      input: "research context engineering and summarize only"
    assert:
      - type: contains
        value: "\"recommended_execution_mode\": \"scout\""
