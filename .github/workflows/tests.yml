name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_council_graph.py \
            --ignore=tests/test_mcp_council_server.py \
            --cov=gateway --cov-report=term-missing
        # Coverage is reported (not gated) for now. Once the measured number is
        # known, add --cov-fail-under=<measured-minus-4> in a follow-up.

  lint:
    runs-on: ubuntu-latest
    # Non-blocking until the codebase is clean, then flip to a required check.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check gateway/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests
          mypy gateway/

  kitty-chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway/kitty-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gateway/kitty-chat/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: ./node_modules/.bin/vitest run
      - name: Build
        run: node node_modules/next/dist/bin/next build
