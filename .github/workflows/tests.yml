name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Builder's immutable packet base must resolve from origin/main.
          fetch-depth: 0
          # Continuity checks compare recorded HEAD to the branch tip; the
          # default refs/pull/N/merge preview is detached and reads as stale.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_council_graph.py \
            --ignore=tests/test_mcp_council_server.py \
            --cov=gateway --cov-report=term-missing --cov-fail-under=10

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check gateway/ tests/ mcp/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests
          mypy gateway/ mcp/

  kitty-chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway/kitty-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gateway/kitty-chat/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: ./node_modules/.bin/vitest run
      - name: Build
        run: node node_modules/next/dist/bin/next build

  browser-smoke:
    runs-on: ubuntu-latest
    needs: kitty-chat
    defaults:
      run:
        working-directory: gateway/kitty-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gateway/kitty-chat/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: node node_modules/next/dist/bin/next build --webpack
      - name: Start server
        run: node node_modules/next/dist/bin/next start -p 4000 &
      - name: Wait for server
        run: npx wait-on http://localhost:4000 --timeout 30000
      - name: Run smoke tests
        run: npx playwright test
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gateway/kitty-chat/playwright-report/
          retention-days: 7

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dead code (vulture)
        run: |
          python -m pip install --upgrade pip
          pip install vulture
          vulture gateway/ --min-confidence 80 \
            --exclude gateway/kitty-chat/

      - name: Broken links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --root-dir docs --no-progress docs/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency analysis (deptry, advisory)
        continue-on-error: true
        run: |
          pip install deptry
          deptry .
        # Advisory: 65 findings as of 2026-07-15, mostly optional deps not
        # declared in requirements.txt (docx, fitz, pypdf) and transitive
        # imports (starlette, google). Configure deptry.toml before gating.
