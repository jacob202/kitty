name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_council_graph.py \
            --ignore=tests/test_mcp_council_server.py \
            --cov=gateway --cov-report=term-missing --cov-fail-under=10

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check gateway/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests
          mypy gateway/

  kitty-chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway/kitty-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gateway/kitty-chat/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: ./node_modules/.bin/vitest run
      - name: Build
        run: node node_modules/next/dist/bin/next build

  browser-smoke:
    runs-on: ubuntu-latest
    needs: kitty-chat
    defaults:
      run:
        working-directory: gateway/kitty-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gateway/kitty-chat/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: node node_modules/next/dist/bin/next build
      - name: Start server
        run: node node_modules/next/dist/bin/next start -p 4000 &
      - name: Wait for server
        run: npx wait-on http://localhost:4000 --timeout 30000
      - name: Run smoke tests
        run: npx playwright test
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gateway/kitty-chat/playwright-report/
          retention-days: 7
