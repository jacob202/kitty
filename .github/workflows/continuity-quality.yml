name: Continuity Quality

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  continuity-and-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Continuity lint
        run: python scripts/check_continuity_state.py --max-age-days 21

      - name: Skill + gate contract tests
        run: |
          pytest tests/test_run_gates_script.py tests/test_skill_runtime_discovery.py tests/test_check_continuity_state.py -q --tb=short

