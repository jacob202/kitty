name: Continuity Quality

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  continuity-and-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Skill + gate contract tests
        run: |
          pytest tests/test_skill_registry.py tests/test_voice_gate.py -q --tb=short

