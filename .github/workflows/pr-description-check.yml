name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-description:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const body = pr.body || '';
            console.log('DEBUG body length:', body.length);
            console.log('DEBUG body:', JSON.stringify(body));
            const missing = [];
            if (!body.includes('## Summary')) missing.push('`## Summary` section');
            if (!body.includes('## Test plan')) missing.push('`## Test plan` section');

            const summaryRe = /## Summary\s*([\s\S]*?)(?=##|$)/;
            const testRe = /## Test plan\s*([\s\S]*?)(?=##|$)/;
            console.log('DEBUG summaryRe source:', summaryRe.source);
            console.log('DEBUG does s match newline:', /\s/.test('\n'));
            console.log('DEBUG does s* consume newlines:', '## Summary\n\n- x'.match(/## Summary\s*(.*)/)?.[1]);
            console.log('DEBUG actual prefix match:', body.slice(0, 40).match(/## Summary\s*(.*)/)?.[1]);
            const prefix = body.slice(0, 30);
            console.log('DEBUG prefix bytes:', Array.from(prefix).map(c => c.charCodeAt(0)));
            const summaryMatch = body.match(summaryRe);
            const testMatch = body.match(testRe);
            console.log('DEBUG summaryMatch:', !!summaryMatch);
            if (summaryMatch) {
              console.log('DEBUG summary captured:', JSON.stringify(summaryMatch[1].trim().slice(0, 60)));
              console.log('DEBUG summary bullet test:', /^-\s/m.test(summaryMatch[1].trim()));
            }
            if (summaryMatch && !summaryMatch[1].trim().match(/^-\s/m)) missing.push('at least one bullet under `## Summary`');
            if (testMatch && !testMatch[1].trim().match(/^-\s|\[.]/m)) missing.push('at least one bullet or checklist item under `## Test plan`');

            if (missing.length > 0) {
              const msg = `PR description is missing:\n${missing.map(m => `- ${m}`).join('\n')}\n\nExpected format:\n\`\`\`\n## Summary\n- what changed and why\n\n## Test plan\n- [ ] how to verify\n\`\`\``;
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: msg
                });
              } catch (err) {
                core.warning(`Could not post comment: ${err.message}`);
              }
              core.setFailed(msg);
            }
