<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kitty — your personal ai</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/kitty-mark.svg">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--ink-deep);
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 0% 0%, rgba(255,122,26,0.10), transparent 35%),
      radial-gradient(circle at 100% 100%, rgba(168,132,255,0.10), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(45,212,191,0.04), transparent 60%);
  }
  #root { height: 100vh; }

  .app {
    display: grid;
    grid-template-columns: 248px 1fr 320px;
    height: 100vh;
    gap: 12px;
    padding: 12px;
    box-sizing: border-box;
  }

  .pane {
    background: linear-gradient(180deg, rgba(37,28,23,0.7), rgba(14,10,8,0.6));
    border: 1px solid var(--ink-line);
    border-radius: 14px;
    backdrop-filter: blur(2px);
    overflow: hidden;
    position: relative;
  }

  /* ============= sidebar ============= */
  .side {
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 14px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 6px 12px;
  }
  .brand img { width: 36px; height: 36px; }
  .brand .word {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--tabby);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .brand .v {
    margin-left: auto;
    font-size: 10px;
    color: var(--cream-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px var(--ink-line);
  }

  .new-btn {
    background: linear-gradient(135deg, var(--tabby), var(--grape));
    color: var(--ink-deep);
    border: 0;
    border-radius: 999px;
    padding: 11px 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: lowercase;
    box-shadow: 0 8px 20px -8px rgba(255,122,26,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .new-btn .plus { font-family: var(--font-display); font-size: 18px; line-height: 1; }
  .new-btn .kbd {
    margin-left: auto;
    font-size: 10px; padding: 2px 6px;
    background: rgba(0,0,0,0.25); border-radius: 4px;
    color: rgba(0,0,0,0.6); font-weight: 600;
  }

  .section-label {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 10px;
    color: var(--cream-faint);
    padding: 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: ""; flex: 1; height: 1px; background: var(--ink-line);
  }

  .threads { display: flex; flex-direction: column; gap: 2px; }
  .thread {
    padding: 8px 10px;
    font-size: 13px;
    color: var(--cream-dim);
    cursor: pointer;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .thread:hover { background: rgba(255,255,255,0.03); color: var(--cream); }
  .thread.active {
    background: rgba(255,122,26,0.1);
    color: var(--cream);
    box-shadow: inset 0 0 0 1px rgba(255,122,26,0.35);
  }
  .thread .when { margin-left: auto; font-size: 10px; color: var(--cream-faint); }
  .thread .ico { font-family: var(--font-display); font-size: 14px; line-height: 1; width: 14px; text-align: center; }
  .thread.active .ico { color: var(--tabby); }
  .thread .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .side-foot {
    margin-top: auto;
    padding: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    box-shadow: inset 0 0 0 1px var(--ink-line);
    font-size: 11px;
    color: var(--cream-faint);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .side-foot .who { color: var(--cream-dim); flex: 1; line-height: 1.3; }
  .side-foot .who b { color: var(--cream); font-weight: 500; display: block; font-size: 13px; }
  .avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--grape), var(--teal));
    border-radius: 999px;
    display: grid; place-items: center;
    color: var(--ink-deep);
    font-family: var(--font-display);
    font-size: 16px;
    box-shadow: 0 0 0 2px var(--ink-deep);
  }
  .side-foot .icon-btn {
    background: transparent; border: 0; cursor: pointer;
    color: var(--cream-faint); font-family: var(--font-display); font-size: 18px;
    padding: 4px 6px;
  }
  .side-foot .icon-btn:hover { color: var(--tabby); }

  /* ============= main ============= */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--ink-line);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    background: rgba(0,0,0,0.15);
  }
  .topbar .title-wrap { display: flex; align-items: baseline; gap: 10px; min-width: 0; flex: 1; }
  .topbar .title {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--cream);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .topbar .title .accent { color: var(--tabby); }
  .topbar .breadcrumb {
    font-size: 11px;
    color: var(--cream-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .pulse-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--mint);
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(124,224,179,0.08);
    box-shadow: inset 0 0 0 1px rgba(124,224,179,0.3);
  }
  .topbar .pulse-dot::before {
    content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.4; } }

  .topbar .right { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    width: 34px; height: 34px;
    background: transparent;
    border: 0;
    border-radius: 10px;
    box-shadow: inset 0 0 0 1px var(--ink-line);
    color: var(--cream-dim);
    cursor: pointer;
    display: grid;
    place-items: center;
    font-family: var(--font-display);
    font-size: 18px;
  }
  .icon-btn:hover { color: var(--tabby); box-shadow: inset 0 0 0 1px rgba(255,122,26,0.5); }

  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0 16px;
  }
  .feed-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .day-divider {
    text-align: center;
    font-size: 10px;
    color: var(--cream-faint);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin: 8px 0 4px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-divider::before, .day-divider::after {
    content: ""; flex: 1; height: 1px; background: var(--ink-line);
  }

  /* messages */
  .msg {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 12px;
    align-items: flex-start;
  }
  .msg.me { grid-template-columns: 1fr 36px; }
  .msg .who-badge {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: rgba(0,0,0,0.4);
    display: grid; place-items: center;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px var(--ink-line);
  }
  .msg .who-badge img { width: 30px; height: 30px; }
  .msg.me .who-badge {
    grid-column: 2;
    grid-row: 1 / span 2;
    background: linear-gradient(135deg, var(--grape), var(--teal));
    color: var(--ink-deep);
    font-family: var(--font-display);
    font-size: 16px;
    box-shadow: none;
  }
  .msg .body { grid-column: 2; min-width: 0; }
  .msg.me .body { grid-column: 1; text-align: right; }
  .msg .who {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cream-faint);
    margin-bottom: 6px;
  }
  .msg .who b { color: var(--tabby); font-weight: 500; }
  .msg.me .who b { color: var(--grape); }

  .bubble {
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--cream);
    display: inline-block;
    max-width: 100%;
    background: rgba(255,255,255,0.025);
    box-shadow: inset 0 0 0 1px var(--ink-line);
    border-radius: 14px;
    border-top-left-radius: 4px;
    text-align: left;
  }
  .msg.me .bubble {
    background: linear-gradient(135deg, var(--tabby), var(--tabby-deep));
    color: var(--ink-deep);
    font-weight: 500;
    box-shadow: 0 8px 20px -8px rgba(255,122,26,0.4);
    border-radius: 14px;
    border-top-right-radius: 4px;
  }
  .bubble code {
    font-family: var(--font-body);
    background: rgba(0,0,0,0.35);
    color: var(--teal);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .msg.me .bubble code { background: rgba(0,0,0,0.2); color: var(--ink-deep); }

  /* tool card inside bubble */
  .tool-card {
    margin-top: 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    box-shadow: inset 0 0 0 1px var(--ink-line);
    padding: 10px 12px;
    font-size: 12px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .tool-card .ico {
    width: 20px; height: 20px;
    background: var(--mint);
    color: var(--ink-deep);
    display: grid; place-items: center;
    border-radius: 6px;
    font-family: var(--font-display);
    font-size: 14px;
  }
  .tool-card .name { color: var(--cream); }
  .tool-card .name span { color: var(--cream-faint); margin-left: 6px; }
  .tool-card .status {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--mint);
    padding: 2px 8px;
    border-radius: 999px;
    box-shadow: inset 0 0 0 1px rgba(124,224,179,0.4);
    background: rgba(124,224,179,0.08);
  }

  .quick-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .chip {
    background: transparent;
    border: 0;
    box-shadow: inset 0 0 0 1px var(--ink-line);
    color: var(--cream-dim);
    font-family: var(--font-body);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: lowercase;
  }
  .chip:hover { box-shadow: inset 0 0 0 1px var(--tabby); color: var(--tabby); }

  /* flight cards */
  .flights { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
  .flight {
    border-radius: 10px;
    box-shadow: inset 0 0 0 1px var(--ink-line);
    background: rgba(0,0,0,0.25);
    padding: 12px;
    position: relative;
  }
  .flight.rec { box-shadow: inset 0 0 0 1px var(--tabby); background: rgba(255,122,26,0.06); }
  .flight .pick {
    position: absolute; top: -8px; left: 12px;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    background: var(--tabby); color: var(--ink-deep); padding: 2px 8px; border-radius: 999px;
    font-weight: 700;
  }
  .flight .price {
    font-family: var(--font-display); font-size: 24px; color: var(--cream);
    line-height: 1; letter-spacing: -0.01em;
  }
  .flight.rec .price { color: var(--tabby); }
  .flight .airline { font-size: 12px; color: var(--cream); margin-top: 6px; }
  .flight .meta { font-size: 10px; color: var(--cream-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  /* Composer */
  .composer-wrap {
    padding: 14px 28px 20px;
    border-top: 1px solid var(--ink-line);
    background: rgba(0,0,0,0.15);
  }
  .composer {
    max-width: 760px;
    margin: 0 auto;
    background: rgba(0,0,0,0.4);
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px var(--ink-line);
    transition: box-shadow 200ms;
  }
  .composer:focus-within {
    box-shadow: inset 0 0 0 1px var(--tabby), 0 0 0 4px rgba(255,122,26,0.15);
  }
  .composer-input {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
  }
  .composer-input .pmt {
    color: var(--teal);
    font-family: var(--font-display);
    font-size: 24px;
    line-height: 1;
  }
  .composer-input input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 6px 0;
  }
  .composer-input input::placeholder { color: var(--cream-faint); }
  .composer-input .caret {
    width: 8px; height: 18px;
    background: var(--tabby-glow);
    animation: blinkCaret 1s steps(2) infinite;
    border-radius: 1px;
  }
  @keyframes blinkCaret { 50% { opacity: 0; } }

  .composer-bar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px dashed var(--ink-line);
    gap: 4px;
  }
  .composer-bar .tool-btn {
    background: transparent;
    border: 0;
    color: var(--cream-faint);
    font-family: var(--font-body);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .composer-bar .tool-btn:hover { color: var(--tabby); background: rgba(255,122,26,0.08); }
  .composer-bar .send {
    margin-left: auto;
    background: var(--tabby);
    color: var(--ink-deep);
    border: 0;
    padding: 8px 16px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-transform: lowercase;
    box-shadow: 0 6px 16px -6px rgba(255,122,26,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .composer-bar .send:hover { background: var(--tabby-glow); }
  .composer-bar .hint {
    font-size: 10px;
    color: var(--cream-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-left: 4px;
  }
  .composer-bar .hint kbd {
    font-family: var(--font-body);
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px var(--ink-line);
    color: var(--cream-dim);
    background: rgba(0,0,0,0.4);
    margin: 0 2px;
  }

  /* ============= right rail ============= */
  .rail {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }
  .rail h3 {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--cream);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .rail h3 .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 999px;
    background: var(--tabby); margin-right: 8px; vertical-align: 3px;
    box-shadow: 0 0 8px var(--tabby);
  }
  .rail .sub { font-size: 11px; color: var(--cream-faint); text-transform: uppercase; letter-spacing: 0.12em; }

  .nudge {
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    box-shadow: inset 0 0 0 1px var(--ink-line);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .nudge.lemon { box-shadow: inset 0 0 0 1px rgba(244,197,66,0.3); background: rgba(244,197,66,0.04); }
  .nudge.maple { box-shadow: inset 0 0 0 1px rgba(255,85,119,0.3); background: rgba(255,85,119,0.04); }
  .nudge.mint { box-shadow: inset 0 0 0 1px rgba(124,224,179,0.3); background: rgba(124,224,179,0.04); }
  .nudge .when {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cream-faint);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nudge .when .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--mint); }
  .nudge.lemon .when .dot { background: var(--lemon); }
  .nudge.maple .when .dot { background: var(--maple); }
  .nudge .title {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--cream);
    line-height: 1.45;
  }
  .nudge .title b { color: var(--cream); font-weight: 600; }
  .nudge .row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat {
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    box-shadow: inset 0 0 0 1px var(--ink-line);
    padding: 12px;
  }
  .stat .num {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--tabby);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .stat .num.mint { color: var(--mint); }
  .stat .num.grape { color: var(--grape); }
  .stat .num.lemon { color: var(--lemon); }
  .stat .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cream-faint);
    margin-top: 4px;
  }

  .now-playing {
    border-radius: 12px;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    background: linear-gradient(135deg, rgba(45,212,191,0.06), rgba(168,132,255,0.06));
    box-shadow: inset 0 0 0 1px var(--ink-line);
  }
  .now-playing img { width: 56px; height: 56px; }
  .now-playing .what {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--cream-faint);
  }
  .now-playing .state {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--mint);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .now-playing .meta {
    font-size: 11px;
    color: var(--cream-dim);
    margin-top: 2px;
  }
  .now-playing .meta .pulse {
    display: inline-block; width: 6px; height: 6px; border-radius: 999px;
    background: var(--mint); margin-right: 6px;
    animation: blink 2s ease-in-out infinite;
  }
</style>
</head>
<body class="kitty">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
