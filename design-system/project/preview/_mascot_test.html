<!doctype html>
<html><head><meta charset="utf-8"><title>mascot test</title>
<style>
  body { background: #15110D; padding: 40px; }
  .row { display: flex; gap: 24px; align-items: flex-end; }
  .box { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  svg { image-rendering: pixelated; image-rendering: crisp-edges; }
  span { color: #FBF7F0; font: 12px monospace; }
</style></head>
<body>
<div class="row">
  <div class="box"><object data="../assets/mascot/kitty.svg" width="64" height="64"></object><span>64</span></div>
  <div class="box"><object data="../assets/mascot/kitty.svg" width="128" height="128"></object><span>128</span></div>
  <div class="box"><object data="../assets/mascot/kitty.svg" width="256" height="256"></object><span>256</span></div>
</div>
</body></html>
