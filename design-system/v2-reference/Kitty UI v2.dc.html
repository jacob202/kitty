<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{overflow:hidden}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-6px) rotate(1.5deg)}}
  @keyframes throb{0%,100%{transform:scale(1) rotate(-1deg)}50%{transform:scale(.93) rotate(1deg)}}
  @keyframes hop{0%,100%{transform:translateY(0) rotate(-1.5deg)}30%{transform:translateY(-14px) rotate(3deg)}55%{transform:translateY(0) rotate(-2deg)}}
  @keyframes blink-cur{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes msg-in{from{transform:translateY(7px)}to{transform:translateY(0)}}
  @keyframes dot1{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  @keyframes dot2{0%,60%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  @keyframes dot3{0%,60%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes pop{0%{opacity:0;transform:scale(.2) translateY(4px) rotate(-20deg)}30%{opacity:1;transform:scale(1) translateY(-8px) rotate(8deg)}100%{opacity:0;transform:scale(.5) translateY(-32px) rotate(20deg)}}
  @keyframes greet{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .cat-idle{animation:bob 4.2s ease-in-out infinite}
  .cat-working{animation:throb 1.1s ease-in-out infinite}
  .cat-done{animation:hop 1.1s ease-in-out}
  .cat-broke{animation:none;filter:saturate(.55)}
  .msg-in{animation:msg-in .22s ease both}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  ::-webkit-scrollbar-track{background:transparent}
  input::placeholder{color:var(--ink2);opacity:.8}
</style>
</helmet>

<div style="{{ rootStyle }}">

  <!-- shared hand-drawn filters -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="wob" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.02" numOctaves="2" seed="7" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.5"></feDisplacementMap>
    </filter>
    <filter id="wob2" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.028" numOctaves="2" seed="3" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8"></feDisplacementMap>
    </filter>
    <filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"></feTurbulence></filter>
  </svg>

  <!-- GREETING -->
  <sc-if value="{{ showGreeting }}" hint-placeholder-val="{{ true }}">
    <div style="position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:30px;max-width:420px;text-align:center;padding:40px">
        <div style="position:relative">
          <div class="cat-idle">{{ catBig }}</div>
          <svg viewBox="0 0 24 24" style="position:absolute;top:-6px;right:-14px;width:30px;height:30px;color:var(--c-yellow)"><path d="M12 1 L14 9 L22 12 L14 15 L12 23 L10 15 L2 12 L10 9 Z" fill="currentColor" filter="url(#wob)"></path></svg>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;align-items:center">
          <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:64px;letter-spacing:-.035em;color:var(--ink);line-height:.86">hey.</h1>
          <p style="font-size:16px;line-height:1.6;color:var(--ink2);max-width:300px">i'm kitty. drawn by a six-year-old, allegedly. here when you need me — let's get things done.</p>
        </div>
        <button onClick="{{ startApp }}" style="background:var(--primary);color:var(--on-primary);border:none;border-radius:14px;padding:14px 40px;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:16px;cursor:pointer;box-shadow:var(--btn-shadow);letter-spacing:-.01em">let's go →</button>
      </div>
    </div>
  </sc-if>

  <!-- APP SHELL -->
  <div style="display:flex;height:100vh;width:100vw;overflow:hidden;position:relative;z-index:2">

    <!-- ░ RAIL (wide, labeled) ░ -->
    <nav style="width:94px;background:var(--surface2);border-right:1.5px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:18px 0 14px;flex-shrink:0">
      <div style="margin-bottom:22px;color:var(--cat-ginger)">{{ catMark }}</div>
      <div style="display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;flex:1">
        <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="5">
          <button onClick="{{ n.action }}" style="{{ n.style }}">
            <svg viewBox="0 0 24 24" style="width:23px;height:23px"><path d="{{ n.d }}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob)"></path></svg>
            <span style="font-size:10px;letter-spacing:.02em;font-weight:600">{{ n.label }}</span>
          </button>
        </sc-for>
      </div>
      <button onClick="{{ toggleTheme }}" title="day / night" style="width:46px;height:46px;border-radius:12px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2)">
        <svg viewBox="0 0 24 24" style="width:21px;height:21px"><path d="{{ themeIconPath }}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob)"></path></svg>
      </button>
      <div style="width:38px;height:38px;border-radius:99px;background:var(--c-purple);display:flex;align-items:center;justify-content:center;margin-top:6px;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;box-shadow:var(--btn-shadow)">d</div>
    </nav>

    <!-- ░ SIDEBAR (dense) ░ -->
    <aside style="width:268px;background:var(--surface);border-right:1.5px solid var(--line);display:flex;flex-direction:column;flex-shrink:0">
      <div style="padding:16px 14px 10px;display:flex;flex-direction:column;gap:10px">
        <button onClick="{{ newChat }}" style="width:100%;border:none;border-radius:12px;background:var(--primary);color:var(--on-primary);padding:11px;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:var(--btn-shadow)">
          <span style="font-size:18px;line-height:1">+</span> new chat
        </button>
        <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--line);border-radius:11px;padding:8px 11px">
          <svg viewBox="0 0 24 24" style="width:15px;height:15px;color:var(--ink2);flex-shrink:0"><path d="M11 4 a7 7 0 1 0 0 14 a7 7 0 0 0 0 -14 M16 16 L21 21" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#wob)"></path></svg>
          <input type="text" placeholder="search chats" value="{{ searchVal }}" onInput="{{ onSearch }}" style="flex:1;border:none;background:transparent;font-family:'Hanken Grotesk',sans-serif;font-size:13px;color:var(--ink);outline:none" />
        </div>
      </div>

      <div style="overflow-y:auto;flex:1;padding:2px 10px 12px;display:flex;flex-direction:column;gap:14px">
        <sc-for list="{{ historyGroups }}" as="g" hint-placeholder-count="4">
          <div style="display:flex;flex-direction:column;gap:5px">
            <div style="display:flex;flex-direction:column;gap:1px;padding:0 4px;margin-bottom:2px">
              <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)">{{ g.label }}</span>
              <svg viewBox="0 0 80 7" preserveAspectRatio="none" style="width:46px;height:6px"><path d="M2 5 Q22 1 40 4 T78 3.5" stroke="{{ g.color }}" stroke-width="2.4" fill="none" stroke-linecap="round" filter="url(#wob)"></path></svg>
            </div>
            <sc-for list="{{ g.items }}" as="h" hint-placeholder-count="2">
              <button onClick="{{ h.select }}" style="{{ h.rowStyle }}">
                <span style="width:9px;height:9px;border-radius:3px;background:{{ h.dot }};flex-shrink:0;margin-top:4px"></span>
                <span style="display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;text-align:left">
                  <span style="font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ h.title }}</span>
                  <span style="{{ h.previewStyle }}">{{ h.preview }}</span>
                </span>
                <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink2);flex-shrink:0;margin-top:3px">{{ h.ago }}</span>
              </button>
            </sc-for>
          </div>
        </sc-for>
      </div>

      <div style="padding:11px 14px;border-top:1.5px solid var(--line);display:flex;align-items:center;gap:8px">
        <span style="width:7px;height:7px;border-radius:99px;background:var(--c-green)"></span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2)">all synced · audience of one</span>
      </div>
    </aside>

    <!-- ░ MAIN ░ -->
    <main style="flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)">

      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 26px;height:58px;border-bottom:1.5px solid var(--line);background:var(--surface);flex-shrink:0">
        <div style="display:flex;align-items:center;gap:11px">
          <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;letter-spacing:-.02em;color:var(--ink)">kitty</span>
          <span style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);border:1.5px solid var(--line);border-radius:99px;padding:3px 10px">
            <span style="width:7px;height:7px;border-radius:99px;background:{{ stateDot }}"></span>{{ catStateLabel }}
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);border:1.5px solid var(--line);border-radius:8px;padding:4px 9px">⌘K</span>
          <button onClick="{{ triggerDone }}" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c-green);border:1.5px solid var(--line);border-radius:8px;padding:4px 9px;background:transparent;cursor:pointer">^_^ done</button>
          <button onClick="{{ triggerError }}" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--c-red);border:1.5px solid var(--line);border-radius:8px;padding:4px 9px;background:transparent;cursor:pointer">:[ broke</button>
        </div>
      </div>

      <div style="flex:1;overflow-y:auto;padding:30px 44px 16px;display:flex;flex-direction:column;gap:18px" id="msglist">
        <div style="display:flex;align-items:center;gap:12px;opacity:.7">
          <span style="flex:1;height:1.5px;background:var(--line)"></span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2)">today</span>
          <span style="flex:1;height:1.5px;background:var(--line)"></span>
        </div>
        <sc-for list="{{ messages }}" as="m" hint-placeholder-count="2">
          <div class="msg-in" style="{{ m.wrapStyle }}">
            <sc-if value="{{ m.isKitty }}" hint-placeholder-val="{{ true }}">
              <span style="{{ m.badgeStyle }}">{{ m.face }}</span>
            </sc-if>
            <span style="{{ m.bubbleStyle }}">
              <sc-if value="{{ m.isTyping }}" hint-placeholder-val="{{ false }}">
                <span style="display:flex;gap:5px;align-items:center;height:16px">
                  <span style="width:6px;height:6px;border-radius:99px;background:var(--ink2);animation:dot1 1.2s ease-in-out infinite"></span>
                  <span style="width:6px;height:6px;border-radius:99px;background:var(--ink2);animation:dot2 1.2s ease-in-out infinite"></span>
                  <span style="width:6px;height:6px;border-radius:99px;background:var(--ink2);animation:dot3 1.2s ease-in-out infinite"></span>
                </span>
              </sc-if>
              <span style="{{ m.textStyle }}">{{ m.text }}</span>
            </span>
          </div>
        </sc-for>

        <sc-if value="{{ showChips }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-wrap:wrap;gap:9px;padding-left:42px;padding-top:2px">
            <sc-for list="{{ chips }}" as="c" hint-placeholder-count="4">
              <button onClick="{{ c.action }}" style="{{ c.style }}">{{ c.label }}</button>
            </sc-for>
          </div>
        </sc-if>
      </div>

      <div style="padding:14px 26px 20px;flex-shrink:0;background:var(--bg)">
        <div style="display:flex;align-items:center;gap:11px;background:var(--surface);border:2px solid var(--primary);border-radius:16px;padding:12px 16px;box-shadow:var(--input-glow)">
          <span style="font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--primary);flex-shrink:0">→</span>
          <input type="text" placeholder="{{ inputPlaceholder }}" value="{{ inputVal }}" onInput="{{ onInput }}" onKeyDown="{{ onKeyDown }}" style="flex:1;border:none;background:transparent;font-family:'Hanken Grotesk',sans-serif;font-size:15px;color:var(--ink);outline:none" />
          <button onClick="{{ sendMsg }}" style="{{ sendBtnStyle }}">↑</button>
        </div>
      </div>

    </main>
  </div>

  <!-- CORNER CAT -->
  <div style="position:fixed;bottom:92px;right:26px;z-index:30;pointer-events:none">
    <div class="{{ catClass }}">{{ catCorner }}</div>
  </div>

  <!-- SPARKLES -->
  <sc-if value="{{ showSparkle }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;bottom:150px;right:34px;z-index:31;pointer-events:none;width:80px;height:80px">
      <sc-for list="{{ sparkles }}" as="s" hint-placeholder-count="3">
        <svg viewBox="0 0 24 24" style="{{ s.style }}"><path d="M12 1 L14 9 L22 12 L14 15 L12 23 L10 15 L2 12 L10 9 Z" fill="{{ s.color }}" filter="url(#wob)"></path></svg>
      </sc-for>
    </div>
  </sc-if>

  <!-- PAPER GRAIN -->
  <svg style="{{ grainStyle }}" aria-hidden="true"><rect width="100%" height="100%" filter="url(#paper)"></rect></svg>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1240, &quot;height&quot;: 820 },
  &quot;density&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;cozy&quot;, &quot;compact&quot;],
    &quot;default&quot;: &quot;cozy&quot;,
    &quot;tsType&quot;: &quot;\&quot;cozy\&quot; | \&quot;compact\&quot;&quot;,
    &quot;section&quot;: &quot;Feel&quot;
  },
  &quot;whimsy&quot;: {
    &quot;editor&quot;: &quot;range&quot;,
    &quot;default&quot;: 70,
    &quot;min&quot;: 0,
    &quot;max&quot;: 100,
    &quot;step&quot;: 5,
    &quot;unit&quot;: &quot;%&quot;,
    &quot;tsType&quot;: &quot;number&quot;,
    &quot;section&quot;: &quot;Feel&quot;
  }
}">
class Component extends DCLogic {
  state = {
    theme: 'day',
    catState: 'idle',
    showGreeting: (function(){ try { return !window.localStorage.getItem('kitty_v2_greeted'); } catch(e){ return true; } })(),
    inputVal: '',
    searchVal: '',
    activeNav: 'home',
    activeHistory: 't1',
    showSparkle: false,
    messages: [{ id: 0, isKitty: true, text: 'hey. what are we doing today', isTyping: false }],
  };

  _typingTimer = null;
  _sparkTimer = null;

  get T() {
    return this.state.theme === 'night' ? {
      bg:'#272D2B', surface:'#2F3633', surface2:'#39423E', line:'#4A534D',
      ink:'#F1ECDD', ink2:'#A6AEA4',
      primary:'#88ABDA', onPrimary:'#23282E', primaryDeep:'#5E84B8',
      catGinger:'#F0A463', catGreen:'#9DC07E', catPink:'#F0A0B4', catOutline:'#F1ECDD',
      gingerFade:'rgba(240,164,99,.18)',
      red:'#EC8576', green:'#9DC07E', yellow:'#F0D06A', purple:'#C0A4DA', blue:'#88ABDA',
      grainBlend:'screen', grainBase:0.05,
    } : {
      bg:'#F3EAD6', surface:'#FBF5E9', surface2:'#EBE0C9', line:'#DACBA9',
      ink:'#3E3527', ink2:'#897C64',
      primary:'#5B7FBF', onPrimary:'#FFFFFF', primaryDeep:'#3E5E97',
      catGinger:'#E68A47', catGreen:'#7FA85F', catPink:'#E5869A', catOutline:'#4A3D2C',
      gingerFade:'rgba(230,138,71,.16)',
      red:'#DC6657', green:'#6E9B52', yellow:'#D6A93E', purple:'#A988C2', blue:'#5B7FBF',
      grainBlend:'multiply', grainBase:0.06,
    };
  }

  // colored crayon cat — ginger fills spilling past a wobbly outline, green eye, pink nose
  catSvg(size) {
    return React.createElement('svg', { viewBox: '0 0 280 210', style: { width: size + 'px', height: 'auto', display: 'block' },
      dangerouslySetInnerHTML: { __html:
        '<g filter="url(#wob2)" opacity="0.9">' +
          '<ellipse cx="170" cy="129" rx="67" ry="51" fill="var(--cat-ginger)"></ellipse>' +
          '<circle cx="80" cy="102" r="49" fill="var(--cat-ginger)"></circle>' +
          '<path d="M55 64 L44 24 L86 57 Z" fill="var(--cat-ginger)"></path>' +
          '<path d="M99 57 L118 24 L121 63 Z" fill="var(--cat-ginger)"></path>' +
          '<path d="M58 56 L50 34 L74 53 Z" fill="var(--cat-pink)"></path>' +
          '<path d="M102 54 L115 36 L116 60 Z" fill="var(--cat-pink)"></path>' +
          '<circle cx="64" cy="95" r="8" fill="var(--cat-green)"></circle>' +
          '<path d="M38 104 L52 100 L49 112 Z" fill="var(--cat-pink)"></path>' +
          '<circle cx="44" cy="114" r="6" fill="var(--cat-pink)" opacity="0.5"></circle>' +
        '</g>' +
        '<g filter="url(#wob)" stroke="var(--cat-outline)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">' +
          '<ellipse cx="168" cy="128" rx="62" ry="46"></ellipse>' +
          '<circle cx="80" cy="102" r="44"></circle>' +
          '<path d="M54 66 L44 24 L88 58"></path>' +
          '<path d="M98 58 L118 24 L122 64"></path>' +
          '<circle cx="64" cy="96" r="4.5" fill="var(--cat-outline)" stroke="none"></circle>' +
          '<path d="M38 104 L52 100 L49 112 Z"></path>' +
          '<path d="M44 113 Q58 126 74 116"></path>' +
          '<path d="M36 100 Q20 96 8 102 M38 114 Q22 116 10 124"></path>' +
          '<path d="M120 168 q-4 18 6 20 M152 172 q-2 18 7 20 M188 170 q0 18 8 19 M214 160 q5 16 12 17"></path>' +
          '<path d="M226 122 Q262 112 256 70 Q254 48 236 58"></path>' +
        '</g>'
      } });
  }

  catMarkSvg() {
    return React.createElement('svg', { viewBox: '0 0 160 150', style: { width: '42px', height: 'auto', display: 'block' },
      dangerouslySetInnerHTML: { __html:
        '<g filter="url(#wob2)" opacity="0.9">' +
          '<circle cx="80" cy="92" r="50" fill="var(--cat-ginger)"></circle>' +
          '<path d="M52 52 L40 14 L84 46 Z" fill="var(--cat-ginger)"></path>' +
          '<path d="M108 46 L122 14 L128 54 Z" fill="var(--cat-ginger)"></path>' +
          '<circle cx="64" cy="88" r="7" fill="var(--cat-green)"></circle>' +
          '<circle cx="96" cy="88" r="7" fill="var(--cat-green)"></circle>' +
        '</g>' +
        '<g filter="url(#wob)" stroke="var(--cat-outline)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">' +
          '<circle cx="80" cy="92" r="46"></circle>' +
          '<path d="M52 54 L40 16 L82 48"></path>' +
          '<path d="M104 48 L122 16 L126 56"></path>' +
          '<circle cx="64" cy="89" r="4" fill="var(--cat-outline)" stroke="none"></circle>' +
          '<circle cx="96" cy="89" r="4" fill="var(--cat-outline)" stroke="none"></circle>' +
          '<path d="M74 100 Q80 106 86 100"></path>' +
        '</g>'
      } });
  }

  renderVals() {
    const T = this.T;
    const s = this.state;
    const density = this.props.density ?? 'cozy';
    const whimsy = this.props.whimsy ?? 70;

    const vars = `--bg:${T.bg};--surface:${T.surface};--surface2:${T.surface2};--line:${T.line};--ink:${T.ink};--ink2:${T.ink2};--primary:${T.primary};--on-primary:${T.onPrimary};--primary-deep:${T.primaryDeep};--cat-ginger:${T.catGinger};--cat-green:${T.catGreen};--cat-pink:${T.catPink};--cat-outline:${T.catOutline};--ginger-fade:${T.gingerFade};--c-red:${T.red};--c-green:${T.green};--c-yellow:${T.yellow};--c-purple:${T.purple};--c-blue:${T.blue};--btn-shadow:0 3px 0 ${T.primaryDeep},0 6px 14px rgba(0,0,0,.10);--input-glow:0 0 0 4px ${T.gingerFade}`;
    const rootStyle = `min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased;${vars}`;

    const grainOpacity = Math.min(0.5, (whimsy / 100)) * T.grainBase * 1.6;
    const grainStyle = `position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:40;opacity:${grainOpacity.toFixed(3)};mix-blend-mode:${T.grainBlend}`;

    // RAIL
    const navDefs = [
      { id:'home',  label:'home',  d:'M3 11 L12 3 L21 11 M6 9 V20 H18 V9' },
      { id:'chats', label:'chats', d:'M4 5 H20 V15 H10 L5 19 V15 H4 Z' },
      { id:'tasks', label:'tasks', d:'M5 5 H19 V19 H5 Z M8 12 l3 3 l5 -6' },
      { id:'files', label:'files', d:'M4 7 H10 L12 5 H20 V18 H4 Z' },
      { id:'about', label:'about', d:'M12 4 V20 M4 12 H20 M7 7 L17 17 M17 7 L7 17' },
    ];
    const navItems = navDefs.map(n => ({
      ...n,
      action: () => this.setState({ activeNav: n.id }),
      style: `width:62px;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 0;border:none;border-radius:14px;cursor:pointer;background:${s.activeNav===n.id?'var(--ginger-fade)':'transparent'};color:${s.activeNav===n.id?'var(--cat-ginger)':'var(--ink2)'}`,
    }));
    const themeIconPath = s.theme==='night'
      ? 'M12 3 V5 M12 19 V21 M3 12 H5 M19 12 H21 M5.5 5.5 L7 7 M17 17 L18.5 18.5 M18.5 5.5 L17 7 M7 17 L5.5 18.5 M12 8 a4 4 0 1 0 0 8 a4 4 0 0 0 0 -8'
      : 'M19 13 a8 8 0 1 1 -8 -10 a6 6 0 0 0 8 10 Z';

    // SIDEBAR — grouped, dense
    const baseGroups = [
      { key:'pinned', label:'pinned', color:'var(--c-red)', dot:'var(--c-red)', items:[
        { id:'p1', title:'weekly planning', preview:'every monday, on it', ago:'\u2605' },
        { id:'p2', title:'reply templates', preview:'the three you reuse', ago:'\u2605' },
      ]},
      { key:'today', label:'today', color:'var(--c-blue)', dot:'var(--c-blue)', items:[
        { id:'t1', title:'pulled my week together', preview:'ok, mon \u2192 fri, sorted', ago:'2h' },
        { id:'t2', title:'drafted reply to sarah', preview:'sent. want a follow-up', ago:'4h' },
        { id:'t3', title:'renamed three files', preview:'done. all lowercase', ago:'5h' },
      ]},
      { key:'yest', label:'yesterday', color:'var(--c-green)', dot:'var(--c-green)', items:[
        { id:'y1', title:'summarised the design doc', preview:'3 takeaways, saved', ago:'1d' },
        { id:'y2', title:'checked calendar conflicts', preview:'found one. moved it', ago:'1d' },
      ]},
      { key:'earlier', label:'earlier', color:'var(--c-purple)', dot:'var(--c-purple)', items:[
        { id:'e1', title:'facts on crayon pigment', preview:'the waxy ones, briefly', ago:'4d' },
        { id:'e2', title:'tidied the downloads pile', preview:'42 files, sorted', ago:'6d' },
      ]},
    ];
    const q = s.searchVal.trim().toLowerCase();
    let groups = baseGroups;
    if (q) {
      const hits = baseGroups.flatMap(g => g.items.filter(it => (it.title + ' ' + it.preview).toLowerCase().includes(q)).map(it => ({ ...it, dot:g.dot })));
      groups = [{ key:'results', label: hits.length ? 'results' : 'nothing here', color:'var(--c-blue)', dot:'var(--c-blue)', items: hits }];
    }
    const compact = density === 'compact';
    const historyGroups = groups.map(g => ({
      label: g.label, color: g.color,
      items: g.items.map(it => ({
        ...it,
        dot: it.dot || g.dot,
        select: () => this.setState({ activeHistory: it.id }),
        rowStyle: `width:100%;display:flex;align-items:flex-start;gap:9px;border:none;border-radius:10px;padding:${compact?'5px 9px':'8px 9px'};cursor:pointer;background:${s.activeHistory===it.id?'var(--ginger-fade)':'transparent'}`,
        previewStyle: `font-size:11.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:${compact?'none':'block'}`,
      })),
    }));

    // CAT
    const faces = { idle:'._.', working:'o_o', done:'^_^', broke:':[' };
    const stateLabels = { idle:'idle', working:'working', done:'done', broke:'broke' };
    const stateDots = { idle:'var(--cat-green)', working:'var(--c-yellow)', done:'var(--c-green)', broke:'var(--c-red)' };
    const catStateLabel = stateLabels[s.catState];
    const stateDot = stateDots[s.catState];
    const catClass = `cat-${s.catState}`;

    // MESSAGES
    const messages = s.messages.map(m => ({
      ...m,
      face: faces[s.catState],
      wrapStyle: `display:flex;align-items:flex-end;gap:10px;${m.isKitty?'':'flex-direction:row-reverse'}`,
      badgeStyle: `width:30px;height:30px;border-radius:99px;background:var(--ginger-fade);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cat-ginger);flex-shrink:0;border:1.5px solid var(--line)`,
      bubbleStyle: `max-width:560px;border-radius:${m.isKitty?'5px 17px 17px 17px':'17px 5px 17px 17px'};padding:11px 16px;background:${m.isKitty?'var(--surface)':'var(--primary)'};border:${m.isKitty?'1.5px solid var(--line)':'none'};box-shadow:0 2px 8px rgba(0,0,0,.06)`,
      textStyle: `font-size:14.5px;line-height:1.5;color:${m.isKitty?'var(--ink)':'var(--on-primary)'};display:${m.isTyping?'none':'inline'}`,
      isTyping: !!m.isTyping,
    }));

    // CHIPS
    const chipLabels = ['plan my week', 'draft a reply', 'what\u2019s on today', 'summarise a doc'];
    const showChips = s.messages.length <= 1 && !s.showGreeting;
    const chips = chipLabels.map((label, i) => ({
      label,
      action: () => this._send(label),
      style: `background:var(--surface);border:1.5px solid var(--line);border-radius:99px;padding:8px 15px;font-family:'Hanken Grotesk',sans-serif;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;transform:rotate(${[-2,1.5,-1,2][i%4]}deg);box-shadow:0 2px 6px rgba(0,0,0,.05)`,
    }));

    const inputPlaceholder = { idle:'ask kitty anything', working:'kitty is on it\u2026', done:'nice. what next', broke:'that broke. try again?' }[s.catState];
    const hasInput = s.inputVal.trim().length > 0;
    const sendBtnStyle = `width:32px;height:32px;border-radius:9px;border:none;background:${hasInput?'var(--primary)':'var(--line)'};color:${hasInput?'var(--on-primary)':'var(--ink2)'};cursor:${hasInput?'pointer':'default'};font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0`;

    // SPARKLES
    const sparkN = whimsy > 5 ? 3 : 0;
    const sparkCfg = [
      { color:'var(--c-yellow)', size:26, l:6,  t:8,  d:0 },
      { color:'var(--cat-ginger)', size:18, l:42, t:0,  d:0.12 },
      { color:'var(--c-blue)', size:15, l:30, t:34, d:0.22 },
    ];
    const sparkles = sparkCfg.slice(0, sparkN).map(c => ({
      color: c.color,
      style: `position:absolute;left:${c.l}px;top:${c.t}px;width:${c.size}px;height:${c.size}px;animation:pop 1.3s ease ${c.d}s forwards`,
    }));

    return {
      rootStyle, grainStyle,
      catBig: this.catSvg(150), catCorner: this.catSvg(66), catMark: this.catMarkSvg(),
      showGreeting: s.showGreeting,
      navItems, themeIconPath,
      historyGroups, searchVal: s.searchVal,
      catStateLabel, stateDot, catClass,
      messages, showChips, chips,
      inputVal: s.inputVal, inputPlaceholder, sendBtnStyle,
      showSparkle: s.showSparkle, sparkles,
      startApp: () => { try { window.localStorage.setItem('kitty_v2_greeted','1'); } catch(e){} this.setState({ showGreeting: false }); this._sparkle(); },
      toggleTheme: () => this.setState(st => ({ theme: st.theme === 'day' ? 'night' : 'day' })),
      newChat: () => this.setState(st => ({ messages: [{ id:0, isKitty:true, text:'hey. what are we doing today', isTyping:false }], catState:'idle', inputVal:'', activeHistory:null })),
      onSearch: (e) => this.setState({ searchVal: e.target.value }),
      onInput: (e) => this.setState({ inputVal: e.target.value }),
      onKeyDown: (e) => { if (e.key === 'Enter') this._send(); },
      sendMsg: () => this._send(),
      triggerDone: () => { this._addKitty('^_^ done. anything else'); this.setState({ catState:'done' }); this._sparkle(); this._resetState(); },
      triggerError: () => { this._addKitty(':[ something went sideways. want me to try again'); this.setState({ catState:'broke' }); this._resetState(3200); },
    };
  }

  _send(textArg) {
    const text = (textArg != null ? textArg : this.state.inputVal).trim();
    if (!text) return;
    const userMsg = { id: Date.now(), isKitty: false, text };
    const typingMsg = { id: Date.now() + 1, isKitty: true, text: '', isTyping: true };
    this.setState(st => ({ messages: [...st.messages, userMsg, typingMsg], inputVal: '', catState: 'working' }), () => this._scroll());
    clearTimeout(this._typingTimer);
    this._typingTimer = setTimeout(() => {
      const replies = ['on it →', 'pulling that up now', 'got it. give me a sec', 'sure, i can do that', 'ok. here you go', 'done. want me to keep going'];
      const reply = replies[Math.floor(Math.random() * replies.length)];
      this.setState(st => ({ messages: [...st.messages.filter(m => !m.isTyping), { id: Date.now(), isKitty: true, text: reply }], catState: 'done' }), () => this._scroll());
      this._sparkle();
      this._resetState();
    }, 1500);
  }

  _addKitty(text) {
    this.setState(st => ({ messages: [...st.messages, { id: Date.now(), isKitty: true, text }] }), () => this._scroll());
  }

  _resetState(ms) {
    clearTimeout(this._resetTimer);
    this._resetTimer = setTimeout(() => this.setState({ catState: 'idle' }), ms || 2200);
  }

  _sparkle() {
    if ((this.props.whimsy ?? 70) <= 5) return;
    this.setState({ showSparkle: false });
    clearTimeout(this._sparkTimer);
    requestAnimationFrame(() => {
      this.setState({ showSparkle: true });
      this._sparkTimer = setTimeout(() => this.setState({ showSparkle: false }), 1400);
    });
  }

  _scroll() {
    const el = document.getElementById('msglist');
    if (el) el.scrollTop = el.scrollHeight;
  }
}
</script>
</body>
</html>
