repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: no-macos-metadata
        name: Block macOS Finder metadata (Icon\r, .DS_Store)
        entry: scripts/check-no-macos-metadata.sh
        language: script
        stages: [pre-commit]
      - id: trufflehog
        name: TruffleHog secret scanner
        description: Detect secrets before commit (requires `brew install trufflehog`)
        entry: trufflehog filesystem . --no-verification --fail
        language: system
        stages: [pre-commit]
        pass_filenames: false
