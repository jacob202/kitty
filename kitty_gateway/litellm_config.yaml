# LiteLLM Proxy Config — Kitty Model Router
# Verify current model IDs at openrouter.ai/models before running
#
# ROUTING OWNERSHIP: This file owns model routing for Open WebUI chat sessions.
# Named virtual models (kitty-default, kitty-agent, kitty-smart) are resolved here.
# Python backend routing is owned by gateway/llm_client.py — keep model IDs in sync.

model_list:
  # Default: cheap, fast, non-sensitive queries.
  # Gemini is intentionally not listed as a duplicate kitty-default fallback
  # because the current key is quota-limited and would make routing flaky.
  - model_name: kitty-default
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # Agent tasks: structured output, tool calls, routing decisions
  # TODO: upgrade to Hermes 4 when available on OpenRouter (not confirmed available as of 2026-05-10)
  - model_name: kitty-agent
    litellm_params:
      model: openrouter/nousresearch/hermes-3-llama-3.1-70b
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # Complex reasoning: architecture, synthesis, code review
  # Routed via OpenRouter to avoid needing a separate Anthropic API key
  - model_name: kitty-smart
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192


  # Embeddings are wired in the ingestion phase, not through the Phase 1
  # chat proxy. Keeping embedding-only models out of model_list prevents
  # LiteLLM health checks from probing them as chat models.

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 20

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  # Daily spend cap (USD). Set in env for quick tuning without code changes.
  # Example: export LITELLM_MAX_BUDGET_USD=1.50
  max_budget: os.environ/LITELLM_MAX_BUDGET_USD
  budget_duration: 1d
  # Master key used by OpenWebUI and other local clients for this proxy.
  master_key: os.environ/LITELLM_MASTER_KEY
