# LiteLLM — Open WebUI + gateway virtual models
#
# FALLBACK PRIORITY (see also gateway/llm_client.py — AgentRouter-first after LiteLLM proxy errors):
#   1) AgentRouter — gpt-5.4-mini bulk chat / gpt-5.5 “smart” / gpt-5.1-codex-mini coding (+ env overrides).
#   2) OpenRouter DeepSeek V4 Flash — under ~$0.01/1K when billed.
#   3) OpenRouter Qwen3 235B free tier — $0 when rate limits allow.
#   4) Gemini 2.5 Flash — cheap with AI Studio key.
#   5) Local MLX — free/private (:8010, kitty-local).
#   AgentRouter model ids must match catalog names from console (adjust if Alias differs).
#
# Run the proxy:  bash kitty_gateway/start_litellm.sh
#
# Env: OPENROUTER_API_KEY, GEMINI_API_KEY, ANTHROPIC_API_KEY, AGENTROUTER_API_KEY,
#      OPENAI_API_KEY, LITELLM_MASTER_KEY, LITELLM_MAX_BUDGET_USD

model_list:
  # --- Cheap routing (default chat, tools, librarian / ingestion via kitty-default) ---
  - model_name: kitty-default
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-agent
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-parts
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-fallback-or
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: kitty-default-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  - model_name: kitty-agent-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  - model_name: kitty-parts-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  - model_name: kitty-agent-or
    litellm_params:
      model: openrouter/nousresearch/hermes-3-llama-3.1-70b
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  # --- AgentRouter (OpenAI-compatible at agentrouter.org) ---
  # Short OpenAI-style IDs; confirm exact spellings in AgentRouter console (/v1/models).
  - model_name: kitty-agentrouter
    litellm_params:
      model: openai/gpt-5.4-mini
      api_base: https://agentrouter.org/v1
      api_key: os.environ/AGENTROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-agentrouter-strong
    litellm_params:
      model: openai/gpt-5.5
      api_base: https://agentrouter.org/v1
      api_key: os.environ/AGENTROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-agentrouter-coding
    litellm_params:
      model: openai/gpt-5.1-codex-mini
      api_base: https://agentrouter.org/v1
      api_key: os.environ/AGENTROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-local
    litellm_params:
      model: openai/mlx-community/Qwen3.5-4B-4bit
      api_base: http://127.0.0.1:8010/v1
      api_key: "not-needed"

  # --- Premium (explicit routes only) ---
  - model_name: kitty-smart
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192

  - model_name: kitty-smart-or
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-openai-direct
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 120

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  # Fallback order matters for Open WebUI: if AgentRouter / codex-mini entries are *first*,
  # LiteLLM jumps to GPT‑5.x + “codex” labels as soon as DeepSeek hiccups — feels like the
  # stack “launched Codex” instead of Kitty. Prefer OpenRouter / Gemini / MLX, then AgentRouter.
  fallbacks:
    - kitty-default: [kitty-fallback-or, kitty-default-gemini, kitty-local, kitty-agentrouter]
    - kitty-parts: [kitty-fallback-or, kitty-parts-gemini, kitty-local, kitty-agentrouter, kitty-agentrouter-coding]
    - kitty-agent: [kitty-agent-or, kitty-fallback-or, kitty-agent-gemini, kitty-local, kitty-agentrouter-coding, kitty-agentrouter]
    - kitty-smart: [kitty-smart-or, kitty-agentrouter-strong, kitty-agentrouter]

general_settings:
  max_budget: os.environ/LITELLM_MAX_BUDGET_USD
  budget_duration: 1d
  master_key: os.environ/LITELLM_MASTER_KEY
