# LiteLLM — Open WebUI + gateway public model surface
#
# One public Kitty route: kitty-default.
# Fallbacks stay internal and provider-focused so the UI and gateway do not expose
# separate "smart" / "agent" tiers anymore.
#
# Run the proxy:  bash gateway/start_litellm.sh
#
# Env: OPENROUTER_API_KEY, GEMINI_API_KEY, AGENTROUTER_API_KEY,
#      OPENAI_API_KEY, LITELLM_MASTER_KEY, LITELLM_MAX_BUDGET_USD

model_list:
  - model_name: kitty-default
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-default-or
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b:free
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 4096

  - model_name: kitty-default-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 8192

  - model_name: kitty-agentrouter
    litellm_params:
      model: openai/gpt-5.4-mini
      api_base: os.environ/AGENTROUTER_API_BASE
      api_key: os.environ/AGENTROUTER_API_KEY
      max_tokens: 8192

  - model_name: kitty-openai-direct
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 120

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  fallbacks:
    - kitty-default: [kitty-default-or, kitty-default-gemini, kitty-agentrouter]

general_settings:
  max_budget: os.environ/LITELLM_MAX_BUDGET_USD
  budget_duration: 1d
  master_key: os.environ/LITELLM_MASTER_KEY
