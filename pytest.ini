[pytest]
# Fast default: skip Playwright browser smoke (session-scoped server + Chromium).
# Run all: pytest tests/ -m ""
# Browser only: pytest tests/ -m browser
addopts = -m "not browser"
pythonpath = .
testpaths = tests
markers =
    browser: needs Playwright/Chromium; slow, optional (install: playwright + pytest-playwright)
    integration: long subprocess or live stack (opt-in in CI if needed)
