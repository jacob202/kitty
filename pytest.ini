[pytest]
# Default run is the "unit+integration light" slice:
#   - not browser: Playwright session (server + Chromium) is very slow
#   - not merge_gate: that test spawns the merge-gate script, which runs a
#     NESTED pytest (3 files) + ./kitty status + 3x curl — minutes for one test
#     while you are already running the full suite.
#
# Run literally everything:  pytest tests/ -m ""
# Merge gate only:            pytest tests/ -m merge_gate
# Browser smoke only:         pytest tests/ -m browser
# Optional speedup:           pip install pytest-xdist && pytest -n auto
addopts = -m "not browser and not merge_gate and not integration" --ignore=tests/test_overnight_retry.py
pythonpath = .
testpaths = tests
markers =
    browser: needs Playwright/Chromium; slow, optional (install: playwright + pytest-playwright)
    merge_gate: runs scripts/run_phase4_merge_gate.sh; nested pytest; use in CI or explicit checks
    integration: long subprocess or live stack (opt-in in CI if needed)
